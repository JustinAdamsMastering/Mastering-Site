  <main>
    <!-- <h1>Contact for Enquiries</h1> -->

    <h1 class="hero-title">Hear the difference</h1>
    <div class="song-select">
      <ul>
        <li data-song="filmScore" tabindex="0">Film Score</li>
        <li data-song="popRock" tabindex="0">Pop Rock</li>
        <li data-song="jazz" tabindex="0">Jazz</li>
      </ul>
    </div>
    <div class="cassette intro-animation" data-ismastered="false" data-playing="false" data-active="true">
      <img src="./public/img/before_cassette-min.webp" width="400px" height="254px" />
      <img class="circle-left spin" src="./public/img/cassette_circle.webp" width="52px" />
      <img class="circle-right spin" src="./public/img/cassette_circle.webp" width="52px" />
      <span class="title">The Long Band Name<br>The Long Song Name Too</span>
    </div>
    <div class="cassette" data-ismastered="true" data-playing="false" data-active="false">
      <img src="./public/img/after_cassette-min.webp" width="400px" height="254px" />
      <img class="circle-left spin" src="./public/img/cassette_circle.webp" width="52px" />
      <img class="circle-right spin" src="./public/img/cassette_circle.webp" width="52px" />
      <span class="title">The Long Band Name<br>The Long Song Name Too</span>
    </div>
    <div class="controlGroup">
      <div class="progressBar">
        <input type="range" id="progressBar" name="progress" value="0" step="0.0001" min="0" max="1"
          aria-label="Progress Slider" />
      </div>
      <div class="buttons">
        <button tabindex="0" data-action="play" data-selected="">
          <!-- <ion-icon name="play-outline" class="btn-inactive"></ion-icon> -->
          <span>▷</span>
          <span>Before</span>
        </button>
        <button tabindex="0" data-action="play-mastered" data-selected="">
          <span>▷</span>
          <!-- <ion-icon name="play-outline" class="btn-inactive"></ion-icon> -->
          <span>Mastered</span>
        </button>
        <button tabindex="0" data-action="stop">
          <!-- <ion-icon name="pause-outline" class="btn-inactive"></ion-icon> -->
          <!-- <span>⏸</span> -->
          <span>⏹</span>
        </button>
      </div>
    </div>
  </main>
